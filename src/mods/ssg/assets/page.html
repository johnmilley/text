<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>{{title}}</title>
<link rel="stylesheet" href="{{root}}_assets/style.css">
<link rel="stylesheet" href="{{root}}_assets/highlight.css">
<link rel="stylesheet" href="{{root}}_assets/custom.css">
<script>
/* apply the saved theme before first paint to avoid a flash */
(function () {
  var t = localStorage.getItem("text-export-theme");
  if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
})();
</script>
</head>
<body>
<header id="topbar">
<nav id="crumbs">{{crumbs}}</nav>
<button id="theme-toggle" title="switch light / dark">◐</button>
</header>
<main>
<article>
{{content}}
</article>
{{pagenav}}
</main>
<script src="{{root}}_assets/highlight.min.js"></script>
<script>
hljs.highlightAll();
document.getElementById("theme-toggle").addEventListener("click", function () {
  var html = document.documentElement;
  var dark = html.dataset.theme
    ? html.dataset.theme === "dark"
    : matchMedia("(prefers-color-scheme: dark)").matches;
  html.dataset.theme = dark ? "light" : "dark";
  localStorage.setItem("text-export-theme", html.dataset.theme);
});
</script>
{{scripts}}
</body>
</html>
