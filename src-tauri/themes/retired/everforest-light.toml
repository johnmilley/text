# text — Everforest Light: soft, low-contrast forest greens on warm paper.
# See text-dark.toml for the token reference.

name = "Everforest Light"
dark = false

[colors]
bg = "#fdf6e3"
bg-panel = "#f4f0d9"
bg-hover = "#efebd4"
fg = "#5c6a72"
fg-muted = "#939f91"
accent = "#8da101"
heading = "#3a4750"
link = "#3a94c5"
tag = "#df69ba"
quote = "#829181"
code = "#dfa000"
code-bg = "#f4f0d9"
border = "#e6e2cc"
cursor = "#5c6a72"
selection = "#dde6cf"

[fonts]
editor = "ui-monospace, 'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace"
ui = "system-ui, sans-serif"
