# text — One Light: the clean, neutral Atom One Light palette.
# See pt-dark.toml for the token reference.

name = "One Light"
dark = false

[colors]
bg = "#fafafa"
bg-panel = "#f0f0f1"
bg-hover = "#e7e7e8"
fg = "#383a42"
fg-muted = "#a0a1a7"
accent = "#4078f2"
heading = "#383a42"
link = "#4078f2"
tag = "#a626a4"
quote = "#a0a1a7"
code = "#986801"
code-bg = "#f0f0f1"
border = "#e5e5e6"
cursor = "#526fff"
selection = "#dfe2e7"

[fonts]
editor = "ui-monospace, 'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace"
ui = "system-ui, sans-serif"
