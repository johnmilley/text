# text — Gruvbox: warm retro-groove dark (github.com/morhetz/gruvbox).
# See text-dark.toml for the token reference.

name = "Gruvbox"
dark = true

[colors]
bg = "#282828"
bg-panel = "#1d2021"
bg-hover = "#3c3836"
fg = "#ebdbb2"
fg-muted = "#928374"
accent = "#fe8019"
heading = "#fabd2f"
link = "#83a598"
tag = "#d3869b"
quote = "#b8bb26"
code = "#8ec07c"
code-bg = "#32302f"
border = "#3c3836"
cursor = "#ebdbb2"
selection = "#504945"
highlight = "#4f3f16"

[fonts]
editor = "ui-monospace, 'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace"
ui = "system-ui, sans-serif"
