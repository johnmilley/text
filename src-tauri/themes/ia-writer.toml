# text — iA Writer: clean minimalist white with the signature blue accent.
# See text-dark.toml for the token reference.

name = "iA Writer"
dark = false

[colors]
bg = "#fcfcfc"
bg-panel = "#f3f3f3"
bg-hover = "#e9e9e9"
fg = "#1a1a1a"
fg-muted = "#9b9b9b"
accent = "#1d9bf0"
heading = "#000000"
link = "#1d9bf0"
tag = "#7a7a7a"
quote = "#6f6f6f"
code = "#4a4a4a"
code-bg = "#f3f3f3"
border = "#e4e4e4"
cursor = "#1d9bf0"
selection = "#cce7fb"
highlight = "#ffec8a"

[fonts]
editor = "ui-monospace, 'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace"
ui = "system-ui, sans-serif"
