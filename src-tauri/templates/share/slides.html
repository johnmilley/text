<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>{{title}}</title>
<link rel="stylesheet" href="{{root}}_assets/style.css">
<link rel="stylesheet" href="{{root}}_assets/highlight.css">
<style>
/* slide deck layout: one slide visible at a time, centered */
html, body { height: 100%; margin: 0; overflow: hidden; }
body { display: flex; flex-direction: column; }
#deck { flex: 1; position: relative; min-height: 0; }
.slide {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column; justify-content: center;
  padding: 4vh 8vw;
  overflow-y: auto;
  font-size: clamp(16px, 2.6vh, 28px);
}
.slide.current { display: flex; }
.slide h1 { font-size: 2em; }
.slide h2 { font-size: 1.6em; }
.slide img { max-width: 100%; max-height: 60vh; object-fit: contain; }
#deck-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px; font-size: 14px; opacity: 0.7;
}
#deck-bar:hover { opacity: 1; }
#deck-bar button { font: inherit; background: none; border: 1px solid currentColor; border-radius: 4px; color: inherit; cursor: pointer; padding: 2px 10px; }
#deck-progress { flex: 1; height: 2px; background: rgba(128,128,128,.3); }
#deck-progress > div { height: 100%; background: currentColor; width: 0; }
@media print {
  html, body { height: auto; overflow: visible; }
  #deck { position: static; }
  .slide { position: static; display: flex !important; min-height: 95vh; page-break-after: always; overflow: visible; }
  #deck-bar { display: none; }
}
</style>
<script>
(function () {
  var t = localStorage.getItem("text-share-theme");
  if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
})();
</script>
</head>
<body>
<main id="deck">
{{slides}}
</main>
<footer id="deck-bar">
  <button id="deck-prev" title="previous (←)">‹</button>
  <button id="deck-next" title="next (→ / space)">›</button>
  <span id="deck-count"></span>
  <div id="deck-progress"><div></div></div>
  <button id="deck-full" title="fullscreen (f)">⛶</button>
</footer>
<script src="{{root}}_assets/highlight.min.js"></script>
<script>
hljs.highlightAll();
(function () {
  var slides = Array.prototype.slice.call(document.querySelectorAll(".slide"));
  var i = Math.min(Math.max(parseInt(location.hash.slice(1), 10) - 1 || 0, 0), slides.length - 1);
  var count = document.getElementById("deck-count");
  var bar = document.querySelector("#deck-progress > div");
  function show(n) {
    i = Math.min(Math.max(n, 0), slides.length - 1);
    slides.forEach(function (s, k) { s.classList.toggle("current", k === i); });
    count.textContent = (i + 1) + " / " + slides.length;
    bar.style.width = ((i + 1) / slides.length * 100) + "%";
    history.replaceState(null, "", "#" + (i + 1));
  }
  document.getElementById("deck-prev").addEventListener("click", function () { show(i - 1); });
  document.getElementById("deck-next").addEventListener("click", function () { show(i + 1); });
  document.getElementById("deck-full").addEventListener("click", function () {
    document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === " ") { e.preventDefault(); show(i + 1); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); show(i - 1); }
    else if (e.key === "Home") show(0);
    else if (e.key === "End") show(slides.length - 1);
    else if (e.key === "f") document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
  });
  // click on the right/left edge advances/rewinds (handy on touch screens)
  document.getElementById("deck").addEventListener("click", function (e) {
    if (e.target.closest("a, button, input, video, audio")) return;
    var x = e.clientX / window.innerWidth;
    if (x > 0.8) show(i + 1);
    else if (x < 0.2) show(i - 1);
  });
  show(i);
})();
</script>
</body>
</html>
