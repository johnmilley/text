name: release

# Build installers for every desktop target on their native runners and attach
# them to a draft GitHub Release. Trigger by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# or run manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            # linuxdeploy (the AppImage bundler tauri-action shells out to) is
            # broken in CI right now — a widely reported, still-open upstream
            # issue (tauri-apps/tauri#14796, #15106) that FUSE workarounds
            # don't reliably fix either. .deb and .rpm bundle fine, so skip
            # AppImage rather than fail the whole Linux build over it.
            args: "--bundles deb,rpm"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "pt ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
